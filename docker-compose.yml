services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: studyspace-postgres
    environment:
      POSTGRES_DB: studyspace
      POSTGRES_USER: studyspace
      POSTGRES_PASSWORD: studyspace123
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyspace -d studyspace"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studyspace-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyspace-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studyspace
      SPRING_DATASOURCE_USERNAME: studyspace
      SPRING_DATASOURCE_PASSWORD: studyspace123
      TZ: UTC
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - studyspace-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: studyspace-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - studyspace-network


  adminer:
    image: adminer:latest
    container_name: studyspace-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - studyspace-network
      
volumes:
  postgres_data:

networks:
  studyspace-network:
    driver: bridge
