# Google Cloud Storage configuration (active when spring.profiles.active=gcs)
app.gcs.bucket-name=${GCS_BUCKET_NAME:studyspace-uploads}
app.gcs.project-id=${GCS_PROJECT_ID:}

# File Upload (same limits as local)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB
